name: Development Workflow (On PR)

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  build:
    name: Build Java project
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v5
      - name: "Setup Java 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: 'maven'            # Enable Maven caching
      - name: "Run the Maven compile script"
        working-directory: numja
        run: mvn compile

  test:
    name: Start Maven Tests
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 10
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v5
      - name: "Setup Java 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: 'maven'            # Enable Maven caching
      - name: "Run the Maven test script"
        working-directory: numja
        run: mvn test